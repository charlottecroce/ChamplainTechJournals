# this playbook performs the initial configuration of the blue5-fw
- name: vyos config
  hosts: vyos
  vars_prompt:

    - name: password
      prompt: enter your new vyos password
      private: True

  tasks:
    - name: set the password hash fact
      set_fact:
        password_hash: "{{ password | password_hash('sha512') }}"
      become: no  # vyos config from template

    - name: vyos config
      become: yes
      template:
        src: files/vyos/config.boot.j2
        dest: /config/config.boot
        mode: "0775"
        owner: root
        group: vyattacfg

    - name: bounce and end
      become: yes
      shell: nohup bash -c "/usr/bin/sleep 5 && /usr/sbin/shutdown -r now" &